<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ゲーム — 最強のケースワーカーは誰だ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="workerCards.js"></script>
<script src="caseCards.js"></script>
<script src="troubleCards.js"></script>
<style>
/* ════════════════════════════════════════
   RESET / BASE
════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d0d0d;
  --green-d:#1e3d1e;--green-b:#3a6b3a;--green-m:#4caf50;--green-l:#a5d6a7;
  --red-d:#3d1e1e;--red-b:#6b3a3a;--red-m:#e53935;--red-l:#ef9a9a;
  --yellow:#ffe082;--blue:#90caf9;--purple:#ce93d8;--orange:#ff8a65;
  --surface:#111;--surface2:#1a1a1a;--border:#222;
  --ur-bg:rgba(255,107,53,.25);--ur-c:#ff8a65;--ur-bd:rgba(255,107,53,.4);
  --sr-bg:rgba(156,39,176,.25);--sr-c:#ce93d8;--sr-bd:rgba(156,39,176,.4);
  --r-bg:rgba(21,101,192,.25);--r-c:#90caf9;--r-bd:rgba(21,101,192,.4);
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Noto Sans JP',sans-serif;color:#fff;user-select:none;}

/* ════════════════════════════════════════
   SCREEN SWITCHER
════════════════════════════════════════ */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto;z-index:1;}
.screen.hidden{display:none!important;}

/* ════════════════════════════════════════
   MODE SELECT
════════════════════════════════════════ */
#scn-mode{
  background:var(--bg);
  background-image:radial-gradient(ellipse at 30% 30%,#0d1f0d,transparent 55%),
                   radial-gradient(ellipse at 70% 70%,#1a0d0d,transparent 55%);
}
.mode-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.5rem,6vw,2.2rem);letter-spacing:.12em;color:#e0e0e0;margin-bottom:4px;}
.mode-sub{font-size:.72rem;color:#555;margin-bottom:24px;letter-spacing:.08em;}
.mode-grid{width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px;}
.mode-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .15s;}
.mode-card:active{transform:scale(.97);}
.mode-card.selected{border-color:var(--green-m);background:rgba(45,106,45,.1);}
.mode-card-title{font-weight:700;font-size:.88rem;color:#e0e0e0;margin-bottom:3px;}
.mode-card-desc{font-size:.7rem;color:#666;line-height:1.5;}
.slabel{font-size:.62rem;color:#444;letter-spacing:.15em;text-transform:uppercase;margin:14px 0 6px;width:100%;max-width:360px;}
.diff-row{display:flex;gap:8px;width:100%;max-width:360px;}
.diff-btn{flex:1;padding:10px 8px;border-radius:10px;border:2px solid var(--border);background:var(--surface);color:#666;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:.8rem;line-height:1.4;transition:all .15s;}
.diff-btn:active{transform:scale(.96);}
.diff-btn.selected{border-color:var(--green-m);color:var(--green-l);background:rgba(45,106,45,.1);}
.start-btn{width:100%;max-width:360px;margin-top:16px;padding:14px;background:linear-gradient(135deg,#1e3d1e,#0f2f0f);border:2px solid var(--green-b);color:var(--green-l);border-radius:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:900;font-size:.95rem;letter-spacing:.08em;transition:all .15s;}
.start-btn:active{transform:scale(.97);}
.back-link{margin-top:14px;font-size:.72rem;color:#444;cursor:pointer;text-decoration:underline;}

/* ════════════════════════════════════════
   GAME SCREEN LAYOUT — flex column dvh
   .screen が position:absolute;inset:0;display:flex;flex-direction:column を提供
   各子要素が dvh で高さを持つ
════════════════════════════════════════ */
#scn-game{
  background:var(--bg);
  background-image:radial-gradient(ellipse at 20% 20%,#0d1f0d,transparent 50%),
                   radial-gradient(ellipse at 80% 80%,#1a0d0d,transparent 50%);
  padding:0;
  flex-direction:column;
  justify-content:flex-start;
  align-items:stretch;
  overflow:hidden;
}

/* ── ① ステータスバー（25dvh） ── */
.status-bar{
  flex-shrink:0;
  height:25vh; height:25dvh;
  background:rgba(0,0,0,.75);backdrop-filter:blur(10px);
  border-bottom:1px solid #1f1f1f;
  padding:0 10px;
  overflow:hidden;
  display:flex;flex-direction:column;justify-content:space-between;
}
.status-row1{
  display:flex;align-items:center;gap:6px;padding:6px 0 2px;
}
.sb-back{background:none;border:1px solid #2a2a2a;color:#555;padding:3px 8px;border-radius:6px;cursor:pointer;font-size:.68rem;font-family:'Noto Sans JP',sans-serif;flex-shrink:0;}
.sb-mode{font-size:.6rem;color:#444;flex:1;text-align:right;letter-spacing:.04em;}
.sb-turn{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;color:#666;flex-shrink:0;}

/* スコア＆ステータスパネル */
.status-row2{
  display:flex;gap:5px;padding:2px 0 2px;align-items:stretch;flex:1;min-height:0;
}
/* ポイント（大きく） */
.stat-pt{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(135deg,rgba(212,160,23,.18),rgba(212,160,23,.06));
  border:1px solid rgba(212,160,23,.3);border-radius:8px;
  padding:4px 10px;min-width:54px;
}
.stat-pt .sv{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.2rem,4vh,1.8rem);color:var(--yellow);line-height:1;}
.stat-pt .sl{font-size:.5rem;color:rgba(255,224,130,.5);letter-spacing:.1em;margin-top:1px;}

/* コイン・メンタル */
.stat-pair{
  display:flex;gap:4px;flex:1;
}
.stat-block{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:8px;padding:3px 4px;
}
.stat-block.s-coin{background:rgba(255,193,7,.1);border:1px solid rgba(255,193,7,.22);}
.stat-block.s-mental{background:rgba(33,150,243,.1);border:1px solid rgba(33,150,243,.22);}
.stat-block.s-mental.low{background:rgba(229,57,53,.12);border-color:rgba(229,57,53,.3);}
.stat-block .sv{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.1rem,3.5vh,1.5rem);line-height:1;}
.stat-block.s-coin .sv{color:var(--yellow);}
.stat-block.s-mental .sv{color:var(--blue);}
.stat-block.s-mental.low .sv{color:var(--red-l);}
.stat-block .sl{font-size:.46rem;letter-spacing:.07em;margin-top:1px;opacity:.5;}

/* フラグ欄 */
.stat-flags{
  display:flex;flex-direction:column;gap:3px;justify-content:center;
}
.sflag{font-size:.6rem;padding:2px 6px;border-radius:5px;white-space:nowrap;font-weight:700;}
.sf-sick{background:rgba(156,204,101,.15);border:1px solid rgba(156,204,101,.3);color:#aed581;}
.sf-audit{background:rgba(229,57,53,.18);border:1px solid rgba(229,57,53,.35);color:var(--red-l);animation:fpulse .9s infinite;}
@keyframes fpulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.sf-guard{background:rgba(33,150,243,.15);border:1px solid rgba(33,150,243,.3);color:var(--blue);}

/* アクション情報 */
.status-row3{
  display:flex;align-items:center;justify-content:space-between;
  padding:3px 0 5px;border-top:1px solid #1a1a1a;
}
.phase-info{font-size:.66rem;color:#aaa;font-weight:700;}
.action-count{font-family:'Bebas Neue',sans-serif;font-size:.8rem;letter-spacing:.05em;color:var(--green-l);}
.action-count.zero{color:#555;}
.phase-btn{padding:4px 12px;border-radius:7px;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:.7rem;}
.pb-end{background:rgba(229,57,53,.15);color:var(--red-l);border:1px solid rgba(229,57,53,.3);}
.pb-end:disabled{opacity:.3;cursor:not-allowed;}
.pb-next{background:rgba(76,175,80,.15);color:var(--green-l);border:1px solid rgba(76,175,80,.3);}

/* ── ② ケースエリア（30dvh） ── */
.cases-area{
  flex-shrink:0;
  height:30vh; height:30dvh;
  overflow-y:hidden;overflow-x:hidden;
  padding:6px 8px 4px;
  display:flex;flex-direction:column;gap:4px;
}
.cases-label{font-size:.6rem;color:#444;letter-spacing:.14em;text-transform:uppercase;margin-bottom:2px;flex-shrink:0;}
/* 横スクロール1行グリッド */
.cases-grid{
  display:flex;
  flex-direction:row;
  gap:6px;
  flex:1;
  min-height:0;
  overflow-x:auto;
  overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;scrollbar-color:#222 transparent;
  align-items:stretch;
}
.cases-grid::-webkit-scrollbar{height:3px;}
.cases-grid::-webkit-scrollbar-thumb{background:#222;border-radius:2px;}

/* ── ケースカード（横向きlandscape・画像左＋情報右） ── */
.case-card{
  background:linear-gradient(160deg,var(--red-d),#1f0f0f);
  border:2px solid var(--red-b);border-radius:10px;
  cursor:pointer;transition:transform .15s,box-shadow .15s;
  overflow:hidden;
  /* 横向き固定幅：スマホで画面幅の90%、PCで最大340px */
  min-width:min(270px,82vw);
  max-width:min(320px,88vw);
  flex-shrink:0;
  /* 横向き：左に画像、右に情報 */
  display:flex;flex-direction:row;
  height:100%;
}
.case-card:active{transform:scale(.98);}
.case-card.targeted{border-color:var(--green-m)!important;box-shadow:0 0 14px rgba(76,175,80,.45);}
.case-card.illegal-glow{border-color:var(--red-m)!important;box-shadow:0 0 10px rgba(229,57,53,.35);}
.case-card.audit-glow{animation:auditPulse 1s infinite;}
@keyframes auditPulse{0%,100%{box-shadow:0 0 8px rgba(255,87,34,.4);}50%{box-shadow:0 0 20px rgba(255,87,34,.7);}}

/* ── ケースカード：左画像エリア ── */
.cc-img{
  width:clamp(70px,20vw,90px);
  flex-shrink:0;
  position:relative;
  overflow:hidden;
  background:linear-gradient(135deg,#4d1b1b,#6b2d2d);
  display:flex;align-items:center;justify-content:center;
}
.cc-img-grad{position:absolute;inset:0;opacity:.35;background:radial-gradient(ellipse at 40% 60%,#ef5350,transparent 55%),radial-gradient(ellipse at 75% 30%,#b71c1c,transparent 50%);}
.cc-noimg{font-size:.5rem;opacity:.2;letter-spacing:.1em;text-transform:uppercase;z-index:1;}

/* ── ケースカード：右情報エリア ── */
.cc-right{
  flex:1;min-width:0;
  display:flex;flex-direction:column;
  padding:6px 8px 5px;
  gap:2px;
  overflow:hidden;
}

/* ケースカードヘッダー */
.cc-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:3px;flex-shrink:0;}
.cc-left{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0;}
.cc-id{font-size:.5rem;opacity:.3;font-family:'Bebas Neue',sans-serif;letter-spacing:.08em;}
.cc-name{font-size:clamp(.68rem,.18vw+.63rem,.78rem);font-weight:700;color:var(--red-l);line-height:1.2;}
.cc-sub{display:flex;gap:3px;align-items:center;margin-top:2px;flex-wrap:wrap;}
.cc-meta{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;}
.cc-meta-top{display:flex;align-items:center;gap:3px;}

/* ポイントバッジ */
.pt-badge{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#d4a017,#f5c842);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:.72rem;color:#1a1000;box-shadow:0 2px 5px rgba(212,160,23,.5);}
.pt-badge.hard{background:linear-gradient(135deg,#e53935,#ff7043);color:#fff;box-shadow:0 2px 5px rgba(229,57,53,.5);}
.rar{font-family:'Bebas Neue',sans-serif;font-size:.65rem;padding:1px 4px;border-radius:3px;line-height:1.5;}
.r-ur{background:var(--ur-bg);color:var(--ur-c);border:1px solid var(--ur-bd);}
.r-sr{background:var(--sr-bg);color:var(--sr-c);border:1px solid var(--sr-bd);}
.r-r{background:var(--r-bg);color:var(--r-c);border:1px solid var(--r-bd);}

/* バッジ系 */
.bdg{font-size:.52rem;padding:1px 3px;border-radius:3px;line-height:1.5;}
.bdg-income-no{background:rgba(255,255,255,.04);color:#555;border:1px solid rgba(255,255,255,.07);}
.bdg-income-yes{background:rgba(255,193,7,.15);color:#ffd54f;border:1px solid rgba(255,193,7,.3);}

/* マーカー */
.cc-markers{display:flex;gap:2px;flex-wrap:wrap;flex-shrink:0;}
.mk{display:flex;align-items:center;gap:2px;font-size:.52rem;padding:1px 3px;border-radius:3px;line-height:1;}
.mk-anger{background:rgba(255,87,34,.17);border:1px solid rgba(255,87,34,.34);color:#ff8a65;}
.mk-illegal{background:rgba(244,67,54,.18);border:1px solid rgba(244,67,54,.36);color:var(--red-l);}
.mk-sick{background:rgba(156,204,101,.12);border:1px solid rgba(156,204,101,.3);color:#aed581;}
.mk-meet{background:rgba(33,150,243,.12);border:1px solid rgba(33,150,243,.3);color:var(--blue);}
.mk-visit{background:rgba(156,39,176,.12);border:1px solid rgba(156,39,176,.3);color:var(--purple);}
.mk-mgmt{background:rgba(255,193,7,.12);border:1px solid rgba(255,193,7,.3);color:var(--yellow);}
.mk-ind{background:rgba(76,175,80,.14);border:1px solid rgba(76,175,80,.3);color:var(--green-l);}
.pips{display:flex;gap:2px;align-items:center;}
.pip{width:5px;height:5px;border-radius:50%;border:1px solid rgba(255,87,34,.4);}
.pip.on{background:#ff5722;border-color:#ff5722;}

/* ケースカード下部 */
.cc-body{display:flex;flex-direction:column;gap:2px;flex:1;min-height:0;}
.cc-stats-row{display:flex;gap:3px;}
.cc-stat{display:flex;align-items:center;gap:2px;font-size:.6rem;padding:2px 4px;border-radius:4px;}
.cs-coin{background:rgba(255,193,7,.1);color:var(--yellow);border:1px solid rgba(255,193,7,.2);}
.cs-mental{background:rgba(33,150,243,.1);color:var(--blue);border:1px solid rgba(33,150,243,.2);}
.cs-sick{background:rgba(156,204,101,.1);color:#aed581;border:1px solid rgba(156,204,101,.2);}
.cc-divider{height:1px;background:rgba(229,57,53,.15);margin:2px 0;flex-shrink:0;}
.cc-effects{display:flex;gap:2px;flex-wrap:wrap;}
.tag{font-size:.52rem;padding:1px 3px;border-radius:3px;white-space:nowrap;line-height:1.6;font-weight:500;}
.t-plus{background:rgba(76,175,80,.13);color:var(--green-l);border:1px solid rgba(76,175,80,.26);font-weight:700;}
.t-minus{background:rgba(229,57,53,.13);color:var(--red-l);border:1px solid rgba(229,57,53,.26);font-weight:700;}
.t-neutral{background:rgba(255,255,255,.05);color:#bbb;border:1px solid rgba(255,255,255,.09);}
.t-special{background:rgba(156,39,176,.13);color:var(--purple);border:1px solid rgba(156,39,176,.26);}
.t-target{background:rgba(255,255,255,.06);color:#bbb;border:1px solid rgba(255,255,255,.09);}
.t-cond{background:rgba(255,193,7,.1);color:var(--yellow);border:1px solid rgba(255,193,7,.2);}
.ill-cond{font-size:.55rem;color:var(--red-l);opacity:.7;padding:1px 4px;border-radius:3px;border:1px dashed rgba(229,57,53,.26);background:rgba(229,57,53,.04);}

/* ── ③ 手札エリア（35dvh） ── */
.hand-area{
  flex-shrink:0;
  height:35vh; height:35dvh;
  background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
  border-top:1px solid #1a1a1a;
  padding-bottom:env(safe-area-inset-bottom,0px);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.hand-header{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 8px 3px;
  border-bottom:1px solid #1a1a1a;
}
.hand-title{font-size:.58rem;color:#444;letter-spacing:.12em;text-transform:uppercase;}
.hand-meta{display:flex;align-items:center;gap:5px;}
.hand-count{font-size:.58rem;color:#444;}
.hand-draw-btn{
  padding:3px 9px;border-radius:5px;border:1px solid rgba(255,193,7,.28);
  background:rgba(255,193,7,.1);color:var(--yellow);
  font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:.62rem;cursor:pointer;
}
.hand-draw-btn:disabled{opacity:.25;cursor:not-allowed;}
.hand-end-btn{
  padding:3px 9px;border-radius:5px;border:1px solid rgba(229,57,53,.28);
  background:rgba(229,57,53,.1);color:var(--red-l);
  font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:.62rem;cursor:pointer;
}
.hand-end-btn:disabled{opacity:.25;cursor:not-allowed;}
.hand-cancel-btn{
  padding:3px 8px;border-radius:5px;border:1px solid #2a2a2a;
  background:rgba(255,255,255,.04);color:#555;
  font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:.6rem;cursor:pointer;
}
.hand-scroll{
  flex:1;display:flex;gap:5px;overflow-x:auto;
  padding:5px 8px 6px;
  align-items:stretch;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;scrollbar-color:#222 transparent;
}
.hand-scroll::-webkit-scrollbar{height:3px;}
.hand-scroll::-webkit-scrollbar-thumb{background:#222;border-radius:2px;}

/* ── ワーカーカード：画像なし・高さをdvhに合わせる ── */
.wk-card{
  background:linear-gradient(160deg,var(--green-d),#0f1f0f);
  border:2px solid var(--green-b);border-radius:9px;
  /* 横：スマホ〜PCで32vw〜130pxに収める */
  min-width:min(110px,32vw);
  max-width:min(126px,35vw);
  flex-shrink:0;
  cursor:pointer;
  transition:transform .15s,box-shadow .15s;
  overflow:hidden;
  display:flex;flex-direction:column;
}
.wk-card:active{transform:scale(.96);}
.wk-card.selected{
  border-color:#ffcc02!important;
  box-shadow:0 0 12px rgba(255,204,2,.5);
  transform:translateY(-5px);
}
.wk-card.unusable{opacity:.45;}
.wk-hdr{
  padding:5px 6px 2px;
  display:flex;align-items:flex-start;justify-content:space-between;gap:3px;
  flex-shrink:0;
}
.wk-left{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0;}
.wk-id{font-size:.48rem;opacity:.3;font-family:'Bebas Neue',sans-serif;letter-spacing:.05em;}
.wk-name{
  font-size:clamp(.6rem,1.8vh,.72rem);font-weight:700;color:var(--green-l);line-height:1.2;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.wk-sub{display:flex;gap:2px;margin-top:1px;flex-wrap:wrap;}
.wk-meta{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;}
.bdg-type-w{font-size:.48rem;padding:1px 3px;border-radius:3px;background:rgba(76,175,80,.18);color:#81c784;line-height:1.5;}
.wk-div{height:1px;background:rgba(76,175,80,.12);margin:0 5px;flex-shrink:0;}
/* ワーカーカード小画像エリア */
.wk-img{
  height:clamp(32px,4vh,44px);
  margin:0 5px;border-radius:4px;overflow:hidden;position:relative;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#1b4d1b,#2d6b2d);
  flex-shrink:0;
}
.wk-img-grad{position:absolute;inset:0;opacity:.25;background:radial-gradient(ellipse at 30% 60%,#66bb6a,transparent 55%),radial-gradient(ellipse at 80% 30%,#388e3c,transparent 50%);}
.wk-noimg{font-size:.48rem;opacity:.18;letter-spacing:.1em;text-transform:uppercase;z-index:1;}
.wk-body{padding:2px 6px 4px;display:flex;flex-direction:column;gap:2px;flex:1;overflow:hidden;}
.wk-row{display:flex;gap:2px;flex-wrap:wrap;}

/* ════════════════════════════════════════
   LOG（10dvh）
════════════════════════════════════════ */
.log-area{
  flex-shrink:0;
  height:10vh; height:10dvh;
  overflow-y:auto;
  padding:4px 12px;background:rgba(0,0,0,.3);
  border-top:1px solid #151515;
  scrollbar-width:none;
}
.log-area::-webkit-scrollbar{display:none;}

<!-- ════════════════════════════════════════
     GAME LOGIC
════════════════════════════════════════ -->
<script>
'use strict';
// ─────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────
const TROUBLE_ICONS={指導検査:'⚖️',法改正:'📜',支給漏れ:'💸',所得隠し:'🕵️',業務妨害:'🚧',電波攻撃:'📡',精神不調:'🌀',不景気:'📉',保護費減額:'💔',大災害:'🌊',コロナ禍:'🦠'};
const TYPE_T={通常:1001,精神:1004,困難:1019};
const TYPE_STYLES={通常:'rgba(76,175,80,.18);color:#81c784',精神:'rgba(156,39,176,.18);color:#ce93d8',困窮:'rgba(255,193,7,.15);color:#ffe082',暴力:'rgba(229,57,53,.18);color:#ef9a9a',困難:'rgba(244,67,54,.25);color:#ff8a65'};
const ID_CARD={};
CASE_CARDS.forEach(c=>{ ID_CARD[Number(c.ID)]=c; });

// ─────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────
const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;};
const clamp=(v,mn,mx)=>Math.max(mn,Math.min(mx,v));
const signed=n=>n>0?`+${n}`:`${n}`;
const nn=v=>v!==null&&v!==undefined;
const getSave=()=>{try{return JSON.parse(localStorage.getItem('cw_save')||'{}')}catch{return{};}};
const setSave=d=>localStorage.setItem('cw_save',JSON.stringify(d));
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}
function closeModal(id){document.getElementById(id).classList.add('hidden');}
function openModal(id){document.getElementById(id).classList.remove('hidden');}

// ─────────────────────────────────────────
// MODE SELECT
// ─────────────────────────────────────────
let selMode='training', selDiff='normal';
function selectMode(m){
  selMode=m;
  document.getElementById('mc-training').classList.toggle('selected',m==='training');
  document.getElementById('mc-endless').classList.toggle('selected',m==='endless');
}
function selectDiff(d){
  selDiff=d;
  document.getElementById('diff-normal').classList.toggle('selected',d==='normal');
  document.getElementById('diff-hard').classList.toggle('selected',d==='hard');
}

// ─────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────
let G={};

function buildDeck(cards){
  const deck=[];
  cards.forEach(c=>{for(let i=0;i<(c['デッキ枚数']||1);i++)deck.push({...c});});
  return shuffle(deck);
}
function mkCase(data){
  return{
    data:{...data},
    curCoins:data['初期所持金']??0,
    curMental:data['初期メンタル']??0,
    angerFlags:0,illegalFlags:0,
    meetMk:0,visitMk:0,mgmtMk:0,
    sickFlag:data['病気フラグ']??0,
    indFlag:false,auditTarget:false,
  };
}
function startGame(){
  const save=getSave();
  if(!save.firstPlay){save.firstPlay=Date.now();}
  save.playCounts=save.playCounts||{};
  save.playCounts[`${selMode}_${selDiff}`]=(save.playCounts[`${selMode}_${selDiff}`]||0)+1;
  setSave(save);

  G={
    mode:selMode,diff:selDiff,
    turn:0,phase:'setup',
    coins:2,mental:5,points:0,
    hand:[],cases:[],
    wDeck:buildDeck(WORKER_CARDS),wDiscard:[],
    cDeck:shuffle([...CASE_CARDS,...CASE_CARDS]),
    tDeck:buildDeck(TROUBLE_CARDS),tDiscard:[],
    auditFlag:false,guardFlag:false,isSick:false,
    actTotal:0,actLeft:0,
    selCard:null,
    log:[],
    _targets:[],
    discReq:0,discCb:null,discSel:[],
  };
  // 初期手札5枚
  for(let i=0;i<5;i++)drawWorker();
  // 初期ケース2枚
  for(let i=0;i<2;i++){const c=G.cDeck.shift();if(c)G.cases.push(mkCase(c));}
  addLog('ゲームスタート！手札5枚・担当ケース2件');
  showScreen('scn-game');
  updateSick();
  startTurn();
}

// ─────────────────────────────────────────
// DECK OPS
// ─────────────────────────────────────────
function drawWorker(n=1){
  for(let i=0;i<n;i++){
    if(!G.wDeck.length){
      if(!G.wDiscard.length){addLog('ワーカー山札切れ！','danger');gameOver('ワーカー山札が切れました');return;}
      G.wDeck=shuffle([...G.wDiscard]);G.wDiscard=[];
      addLog('ワーカー山札リシャッフル');
    }
    G.hand.push(G.wDeck.shift()); // 上限チェックは呼び出し元のcheckHandLimitに委ねる
  }
}
function drawCase(){
  if(!G.cDeck.length){addLog('ケース山札が空');return null;}
  const c=G.cDeck.shift();
  G.cases.push(mkCase(c));
  addLog(`新規ケース「${c['カード名']}」（${c['種別']}）`,'info');
  updateSick();
  return c;
}
function drawTrouble(){
  if(!G.tDeck.length){
    if(!G.tDiscard.length)return null;
    G.tDeck=shuffle([...G.tDiscard]);G.tDiscard=[];
  }
  return G.tDeck.shift();
}

// ─────────────────────────────────────────
// TURN FLOW
// ─────────────────────────────────────────
function startTurn(){
  G.turn++;
  G.selCard=null;
  addLog(`─── ターン ${G.turn} 開始 ───`,'info');
  if(G.turn===1){
    G.phase='action';startActionPhase();
  } else {
    doRecovery();
  }
}
function doRecovery(){
  G.phase='recovery';
  if(G.isSick){G.coins+=1;addLog('回復：💰+1（病気中）');}
  else{G.coins+=3;addLog('回復：💰+3','good');}
  doCaseStats();
}
function doCaseStats(){
  G.phase='caseStats';
  G.cases.forEach(cs=>{
    const d=cs.data;
    if(nn(d['ターンエンド_所持金変動']))cs.curCoins=Math.max(0,cs.curCoins+d['ターンエンド_所持金変動']);
    if(nn(d['ターンエンド_メンタル変動']))cs.curMental=Math.max(0,cs.curMental+d['ターンエンド_メンタル変動']);
    if(d['収入フラグ']==='収入あり')cs.curCoins++;
    if(!G.guardFlag){
      if(nn(d['プレイヤー所持金変動'])&&d['プレイヤー所持金変動']<0){G.coins=Math.max(0,G.coins+d['プレイヤー所持金変動']);addLog(`ケース「${d['カード名']}」 PL💰${signed(d['プレイヤー所持金変動'])}`,'danger');}
      if(nn(d['プレイヤーメンタル変動'])&&d['プレイヤーメンタル変動']<0){G.mental=Math.max(0,G.mental+d['プレイヤーメンタル変動']);addLog(`ケース「${d['カード名']}」 PL🧠${signed(d['プレイヤーメンタル変動'])}`,'danger');}
    } else {
      // ガード中はマイナスのみ無効
      if(nn(d['プレイヤー所持金変動'])&&d['プレイヤー所持金変動']>0)G.coins+=d['プレイヤー所持金変動'];
      if(nn(d['プレイヤーメンタル変動'])&&d['プレイヤーメンタル変動']>0)G.mental+=d['プレイヤーメンタル変動'];
    }
  });
  G.guardFlag=false;
  if(G.mental<=0){gameOver('ケース対応でメンタル崩壊');return;}
  updateSick();
  showTrouble();
}
function showTrouble(){
  G.phase='trouble';
  const card=drawTrouble();
  if(!card){doCaseAdd();return;}
  G.tDiscard.push(card);
  G._pendingTroubleCard=card;
  // まずモーダル表示
  document.getElementById('mt-icon').textContent=TROUBLE_ICONS[card['カード名']]||'⚠️';
  document.getElementById('mt-name').textContent=card['カード名'];
  document.getElementById('mt-text').textContent=card['効果詳細テキスト']||'';
  openModal('modal-trouble');
}
function closeTroubleModal(){
  closeModal('modal-trouble');
  if(G.phase==='gameOver')return;
  // 効果を適用（手札捨てが必要な場合は選択モーダルが出て、完了後doCaseAdd）
  const card=G._pendingTroubleCard;
  G._pendingTroubleCard=null;
  if(!card){doCaseAdd();return;}
  applyTrouble(card,()=>{
    if(G.phase==='gameOver')return;
    doCaseAdd();
  });
}
function doCaseAdd(){
  G.phase='addCase';
  let add=G.diff==='hard'||(G.turn>=3&&G.turn%2===1);
  if(add)drawCase();
  startActionPhase();
}
function startActionPhase(){
  G.phase='action';
  // ▼ 毎ターン2枚ドロー
  drawWorker(2);
  checkHandLimit();
  // ▼ 行動数 = ケース数 + 1
  G.actTotal=G.cases.length+1;
  G.actLeft=G.actTotal;
  render();
}
function endPlayerTurn(){
  if(G.phase!=='action')return;
  G.selCard=null;
  G.phase='turnEnd';
  runTurnEnd();
}

// ─────────────────────────────────────────
// TURN END ①〜⑦
// ─────────────────────────────────────────
function runTurnEnd(){
  addLog('── ターンエンド ──');
  // ①不正フラグ加算
  G.cases.forEach(cs=>{
    const d=cs.data;
    const ic=d['ターンエンド_不正フラグ加算条件_所持金'];
    const im=d['ターンエンド_不正フラグ加算条件_メンタル'];
    const ok1=!nn(ic)||cs.curCoins<=ic;
    const ok2=!nn(im)||cs.curMental<=im;
    if(ok1&&ok2&&(nn(ic)||nn(im))){
      cs.illegalFlags++;
      addLog(`「${d['カード名']}」不正+1→${cs.illegalFlags}`,'danger');
    }
  });
  // ②不正ペナルティ
  const totIll=G.cases.reduce((s,cs)=>s+cs.illegalFlags,0);
  if(totIll>0){G.coins=Math.max(0,G.coins-totIll);addLog(`不正合計${totIll}：PL💰-${totIll}`,'danger');}
  // ③怒りフラグ3→困難変化
  for(let i=G.cases.length-1;i>=0;i--){
    if(G.cases[i].angerFlags>=3){addLog(`「${G.cases[i].data['カード名']}」怒り3→困難変化！`,'danger');transformCase(i,1019);}
  }
  // ④自立判定（困難ケースは indFlag 専用カード使用時のみ自立可能）
  G._indQueue=[];
  for(let i=G.cases.length-1;i>=0;i--){
    const cs=G.cases[i];
    const isHard=cs.data['種別']==='困難';
    // 困難ケース：indFlag のみ自立。coins>=5 では自立しない
    // 通常等：coins>=5 または indFlag で自立
    if(isHard ? cs.indFlag : (cs.curCoins>=5||cs.indFlag)){
      resolveCase(i,'independence');
    }
  }
  // 自立ポップアップがあれば表示（確認後に⑤以降を継続）
  if(G._indQueue&&G._indQueue.length>0){
    render();
    flushIndQueue(()=>{
      afterIndQueue();
    });
    return;
  }
  afterIndQueue();
}

// ⑤〜⑦：自立ポップアップ確認後に呼ばれる
function afterIndQueue(){
  if(checkWin())return;
  // ⑤監査判定
  if(G.auditFlag){
    const hasIll=G.cases.some(cs=>cs.illegalFlags>0);
    if(hasIll){addLog('監査：不正残存→ゲームオーバー','danger');gameOver('監査で不正ケースが発覚');return;}
    G.auditFlag=false;addLog('監査クリア','good');
  }
  // ⑥精神変化
  for(let i=G.cases.length-1;i>=0;i--){
    if(G.cases[i].curMental<=0&&G.cases[i].data['種別']!=='精神'){addLog(`「${G.cases[i].data['カード名']}」🧠0→精神変化`,'danger');transformCase(i,1004);}
  }
  // ⑦ルーレット
  showRoulette();
}

// ─────────────────────────────────────────
// INDEPENDENCE POPUP QUEUE
// ─────────────────────────────────────────
function flushIndQueue(cb){
  G._indCb=cb;
  showNextInd();
}
function showNextInd(){
  if(!G._indQueue||!G._indQueue.length){
    const cb=G._indCb;G._indCb=null;
    if(cb)cb();
    return;
  }
  const item=G._indQueue.shift();
  const isHard=item.pt===2;
  document.getElementById('ind-case-name').textContent=item.name;
  document.getElementById('ind-pt').textContent=`+${item.pt}`;
  document.getElementById('ind-pt').style.color=isHard?'var(--orange)':'var(--yellow)';
  document.getElementById('ind-total').textContent=`累計 ${item.total} pt`;
  // sparkleアイコンを困難は🌟に
  document.querySelector('.ind-sparkle').textContent=isHard?'🌟':'🎉';
  document.getElementById('ind-popup').classList.remove('hidden');
  render();
}
function closeIndPopup(){
  document.getElementById('ind-popup').classList.add('hidden');
  showNextInd();
}

// ─────────────────────────────────────────
// ROULETTE
// ─────────────────────────────────────────
function showRoulette(){
  const opts=[
    {label:'何もなし',icon:'😌',fn:(_cb)=>({detail:'何も起きなかった。'})},
    {label:'困窮ケース判定',icon:'💸',fn:(_cb)=>{
      const d=[];
      for(let i=G.cases.length-1;i>=0;i--){
        const cs=G.cases[i];
        if(cs.data['種別']!=='困窮')continue;
        if(cs.curCoins<=0){d.push(`「${cs.data['カード名']}」💰0→死亡`);resolveCase(i,'death');}
        else if(cs.curMental<=0){d.push(`「${cs.data['カード名']}」🧠0→失踪`);resolveCase(i,'missing');}
      }
      return{detail:d.join('\n')||'該当ケースなし'};
    }},
    {label:'精神ケース判定',icon:'😰',fn:(_cb)=>{
      const d=[];
      for(let i=G.cases.length-1;i>=0;i--){
        const cs=G.cases[i];
        if(cs.data['種別']!=='精神')continue;
        if(cs.curCoins<=0){d.push(`「${cs.data['カード名']}」💰0→失踪`);resolveCase(i,'missing');}
        else if(cs.curMental<=0){cs.angerFlags++;d.push(`「${cs.data['カード名']}」🧠0→怒り+1`);}
      }
      return{detail:d.join('\n')||'該当ケースなし'};
    }},
    {label:'暴力ケース判定',icon:'👊',fn:(_cb)=>{
      const d=[];
      G.cases.forEach(cs=>{
        if(cs.data['種別']!=='暴力')return;
        if(cs.curCoins<=0||cs.curMental<=0){cs.angerFlags++;d.push(`「${cs.data['カード名']}」→怒り+1`);}
      });
      return{detail:d.join('\n')||'該当ケースなし'};
    }},
    {label:'トラブル追加',icon:'⚡',fn:(cb)=>{
      const ex=drawTrouble();
      if(ex){
        G.tDiscard.push(ex);
        const detail=`「${ex['カード名']}」が追加発動！\n${ex['効果詳細テキスト']||''}`;
        document.getElementById('rl-detail').textContent=detail;
        document.getElementById('rl-ok').disabled=false;
        addLog(`ルーレット追加：${ex['カード名']}`);
        applyTrouble(ex,cb);
      } else {
        document.getElementById('rl-detail').textContent='トラブル山札が空でした';
        document.getElementById('rl-ok').disabled=false;
        if(cb)cb();
      }
    }},
  ];
  const roll=0|Math.random()*5;
  const chosen=opts[roll];
  openModal('modal-roulette');
  document.getElementById('rl-result').textContent='';
  document.getElementById('rl-detail').textContent='';
  document.getElementById('rl-ok').disabled=true;
  const icons=['😌','💸','😰','👊','⚡'];
  let cnt=0;
  const timer=setInterval(()=>{
    document.getElementById('rl-wheel').textContent=icons[cnt++%5];
    if(cnt>16){
      clearInterval(timer);
      document.getElementById('rl-wheel').textContent=chosen.icon;
      document.getElementById('rl-result').textContent=chosen.label;
      addLog(`ルーレット：${chosen.label}`);
      // トラブル追加はfnがコールバックを管理
      if(chosen.label==='トラブル追加'){
        chosen.fn(null); // rlOkは内部でdisabledを解除
      } else {
        const res=chosen.fn(null);
        document.getElementById('rl-detail').textContent=res?res.detail||'':'';
        document.getElementById('rl-ok').disabled=false;
      }
    }
  },75);
}
function closeRouletteModal(){
  closeModal('modal-roulette');
  if(G.phase==='gameOver')return;
  if(G.mental<=0){gameOver('メンタル崩壊');return;}
  if(!checkWin())startTurn();
  render();
}

// ─────────────────────────────────────────
// CASE MANAGEMENT
// ─────────────────────────────────────────
function transformCase(idx,newId){
  if(idx<0||idx>=G.cases.length)return;
  const tmpl=ID_CARD[newId];
  if(!tmpl){addLog(`変化先ID${newId}が見つかりません`,'danger');return;}
  const old=G.cases[idx];
  const ncs=mkCase(tmpl);
  ncs.curCoins=old.curCoins;ncs.curMental=old.curMental;
  ncs.angerFlags=old.angerFlags;ncs.illegalFlags=old.illegalFlags;
  if(newId===1004&&old.data['種別']==='精神')ncs.visitMk=Math.floor(old.visitMk/2);
  G.cases[idx]=ncs;
  updateSick();
}
function resolveCase(idx,reason){
  if(idx<0||idx>=G.cases.length)return;
  const cs=G.cases[idx];
  const name=cs.data['カード名'];
  if(reason==='independence'){
    const pt=cs.data['種別']==='困難'?2:1;
    G.points+=pt;
    addLog(`「${name}」自立廃止 +${pt}pt（計${G.points}pt）`,'good');
    // ポップアップキューに積む（呼び出し元がキューをflushする）
    G._indQueue=G._indQueue||[];
    G._indQueue.push({name,pt,total:G.points});
  } else if(reason==='death'){
    G.points=Math.max(0,G.points-1);G.mental=Math.max(1,G.mental-1);
    addLog(`「${name}」死亡 PT-1 PL🧠-1`,'danger');
  } else if(reason==='missing'){
    G.coins=Math.max(0,G.coins-1);addLog(`「${name}」失踪 PL💰-1`,'danger');
  } else {
    addLog(`「${name}」${reason}`);
  }
  G.cases.splice(idx,1);updateSick();
}
function checkMarkers(idx){
  if(idx<0||idx>=G.cases.length)return;
  const cs=G.cases[idx];const type=cs.data['種別'];
  if(type==='困窮'&&cs.mgmtMk>=2){
    addLog(`「${cs.data['カード名']}」管理×2→通常変化`,'good');
    transformCase(idx,1001);const tc=G.cases[idx];if(tc){tc.curCoins+=1;}return;
  }
  if(type==='精神'&&cs.visitMk>=2){
    addLog(`「${cs.data['カード名']}」通院×2→通常変化`,'good');
    transformCase(idx,1001);const tc=G.cases[idx];if(tc){tc.curMental+=2;}return;
  }
  if(type==='暴力'&&cs.meetMk>=2){
    addLog(`「${cs.data['カード名']}」面談×2→通常変化`,'good');
    transformCase(idx,1001);const tc=G.cases[idx];if(tc){tc.curMental+=1;}return;
  }
}
function updateSick(){
  G.isSick=G.cases.reduce((s,cs)=>s+cs.sickFlag,0)>=2;
}

// ─────────────────────────────────────────
// TROUBLE APPLICATION
// ─────────────────────────────────────────
function applyTrouble(card, cb){
  addLog(`トラブル「${card['カード名']}」発動`,'danger');
  const pm=card['プレイヤーメンタル変動']||0;
  const pw=card['プレイヤー所持金変動']||0;
  const ph=card['プレイヤー手札強制捨て枚数']||0;
  const pd=card['プレイヤードロー数']||0;
  const cm=card['ケースメンタル変動']||0;
  const cw=card['ケース所持金変動']||0;
  const ca=card['ケース怒りフラグ加算']||0;
  const cf=card['ケース不正フラグ加算']||0;
  const csick=card['病気フラグ変動']||0;
  const newC=card['新規ケース追加枚数']||0;
  const ttype=card['対象ケース種別'];
  const tflag=card['対象フラグ種別'];
  const multi=card['乗算フラグ'];
  const auditF=card['監査フラグ付与'];

  // プレイヤー影響（メンタル）
  if(pm!==0){
    if(auditF){
      const hasIll=G.cases.some(cs=>cs.illegalFlags>0);
      if(hasIll){
        G.mental=Math.max(1,G.mental+pm);
        G.auditFlag=true;
        addLog(`監査：不正あり PL🧠${signed(pm)}（最低1）監査フラグ付与`,'danger');
      } else addLog('監査：不正なし 影響なし','good');
    } else {
      const cnt=multi?G.cases.filter(cs=>!ttype||cs.data['種別']===ttype).length:1;
      G.mental=Math.max(0,G.mental+pm*cnt);
      if(pm<0)addLog(`PL🧠${signed(pm*cnt)}`,'danger');
    }
  }
  // メンタル0チェック（ここで即座に判定して早期リターン）
  if(G.mental<=0){ gameOver('トラブルカードによるメンタル崩壊'); return; }

  // プレイヤー影響（コイン）
  if(pw!==0&&!auditF){
    const cnt=multi?G.cases.length:1;
    G.coins=Math.max(0,G.coins+pw*cnt);
    if(pw<0)addLog(`PL💰${signed(pw*cnt)}`,'danger');
  }
  // ドロー
  if(pd>0){drawWorker(pd);addLog(`${pd}枚ドロー`,'good');}
  // ケース影響
  const filt=cs=>{
    if(ttype&&ttype!=='全て'&&cs.data['種別']!==ttype)return false;
    if(tflag==='不正'&&cs.illegalFlags<=0)return false;
    return true;
  };
  G.cases.forEach(cs=>{
    if(!filt(cs))return;
    if(cm)cs.curMental=Math.max(0,cs.curMental+cm);
    if(cw)cs.curCoins=Math.max(0,cs.curCoins+cw);
    if(ca)cs.angerFlags+=ca;
    if(cf)cs.illegalFlags+=cf;
    if(csick)cs.sickFlag=Math.max(0,cs.sickFlag+csick);
  });
  if(newC>0)for(let i=0;i<newC;i++)drawCase();
  updateSick();
  render();

  // 手札強制捨て（選択式）
  if(ph>0&&G.hand.length>0){
    const n=Math.min(ph,G.hand.length);
    triggerDiscard(n, ()=>{
      if(cb)cb();
    });
    return;
  }
  if(cb)cb();
}

// ─────────────────────────────────────────
// WORKER CARD PLAY
// ─────────────────────────────────────────
function canAfford(card){
  const cost=card['プレイヤー所持金変動']||0;return cost>=0||G.coins>=Math.abs(cost);
}
function checkCond(card,cs){
  if(!cs)return true;
  const t=card['使用条件_ケース種別'];if(t&&cs.data['種別']!==t)return false;
  const fl=card['使用条件_フラグ'];
  if(fl==='不正'&&cs.illegalFlags<=0)return false;
  if(fl==='収入あり'&&cs.data['収入フラグ']!=='収入あり')return false;
  if(fl==='収入なし'&&cs.data['収入フラグ']==='収入あり')return false;
  if(nn(card['使用条件_ケース所持下限'])&&cs.curCoins<card['使用条件_ケース所持下限'])return false;
  if(nn(card['使用条件_ケース所持上限'])&&cs.curCoins>card['使用条件_ケース所持上限'])return false;
  if(nn(card['使用条件_ケースメンタル下限'])&&cs.curMental<card['使用条件_ケースメンタル下限'])return false;
  if(nn(card['使用条件_ケースメンタル上限'])&&cs.curMental>card['使用条件_ケースメンタル上限'])return false;
  if(Number(card['ID'])===2210&&cs.data['種別']!=='困難')return false;
  return true;
}
function getTargets(card){
  const range=card['対象範囲'];const tgts=[];
  if(['自分','ワーカー単体','ワーカー全員'].includes(range)){tgts.push({type:'player',label:'自分（CW）'});return tgts;}
  if(range==='担当ケース単体'||range==='ケース単体'){
    G.cases.forEach((cs,i)=>{if(checkCond(card,cs))tgts.push({type:'case',idx:i,label:cs.data['カード名'],cs});});
    return tgts;
  }
  if(range==='担当ケース全員'||range==='ケース全員'){
    // 条件を満たすケースが1件以上あれば全員対象として有効
    const hasValid=G.cases.some(cs=>checkCond(card,cs));
    if(hasValid)tgts.push({type:'all',label:'全担当ケース（条件合致のみ）'});
    return tgts;
  }
  return tgts;
}
function hasAnyTarget(card){return getTargets(card).length>0;}

function onClickWorker(hi){
  if(G.phase!=='action')return;
  const card=G.hand[hi];
  const noAct=G.actLeft<=0;
  const affordable=!noAct&&canAfford(card);
  const tgts=affordable?getTargets(card):[];
  const canUse=!noAct&&affordable&&tgts.length>0;

  G.selCard=canUse?hi:null;
  G._targets=tgts;

  document.getElementById('mc-title').textContent=card['カード名'];
  let detailText=card['効果詳細テキスト']||'（効果詳細なし）';
  if(noAct)          detailText='残り行動数が0です。\n\n'+detailText;
  else if(!affordable)detailText='💰が不足しています。\n\n'+detailText;
  else if(!tgts.length)detailText='使用条件を満たすケースがありません。\n\n'+detailText;
  document.getElementById('mc-detail').textContent=detailText;

  const tDiv=document.getElementById('mc-targets');
  const btnDiv=document.getElementById('mc-btns');

  if(!canUse){
    tDiv.innerHTML='';
    btnDiv.innerHTML=`<button class="mbtn mbtn-cancel" onclick="closeModal('modal-card');cancelSelect()">閉じる</button>`;
  } else if(tgts.length===1&&(tgts[0].type==='player'||tgts[0].type==='all')){
    tDiv.innerHTML='';
    btnDiv.innerHTML=`<button class="mbtn mbtn-use" onclick="doUse(${hi},0)">使用する</button>`
                   +`<button class="mbtn mbtn-cancel" onclick="closeModal('modal-card');cancelSelect()">やめる</button>`;
  } else {
    tDiv.innerHTML='<div style="font-size:.7rem;color:#666;margin-bottom:6px;">対象を選択</div><div class="target-list">'
      +tgts.map((t,ti)=>`<div class="target-item" onclick="doUse(${hi},${ti})">
        <span class="ti-name">${t.label}</span>
        <span class="ti-stats">${t.cs?`💰${t.cs.curCoins} 🧠${t.cs.curMental}`:''}</span>
      </div>`).join('')+'</div>';
    btnDiv.innerHTML=`<button class="mbtn mbtn-cancel" onclick="closeModal('modal-card');cancelSelect()">やめる</button>`;
  }
  openModal('modal-card');
  render();
}
function doUse(hi,ti){
  closeModal('modal-card');
  const card=G.hand[hi];const tgt=G._targets[ti];
  if(!tgt)return;
  // コスト
  const pw=card['プレイヤー所持金変動']||0,pm=card['プレイヤーメンタル変動']||0;
  G.coins=Math.max(0,G.coins+pw);G.mental=Math.max(0,G.mental+pm);
  // 効果
  if(tgt.type==='player')applyPL(card);
  else if(tgt.type==='all')G.cases.forEach((_,i)=>{if(checkCond(card,G.cases[i]))applyCase(card,i);});
  else applyCase(card,tgt.idx);
  // ガード
  if(card['プレイヤーガードフラグ'])G.guardFlag=true;
  // カード消費
  G.wDiscard.push(G.hand.splice(hi,1)[0]);
  G.actLeft--;G.selCard=null;
  addLog(`「${card['カード名']}」使用（残行動${G.actLeft}）`,'good');
  if(G.mental<=0){gameOver('メンタル崩壊');return;}

  const discN=card['捨て札数']||0;
  const drawN=card['ドロー数']||0;

  // ① まず捨て札処理
  if(discN>0&&G.hand.length>0){
    triggerDiscard(discN,()=>{
      // ② 捨て後にドロー
      if(drawN>0){drawWorker(drawN);}
      // ③ ドロー後に上限チェック（超えてたら選んで捨て）
      checkHandLimit();
      render();
    });
    return;
  }
  // 捨て札なし：ドロー→上限チェック
  if(drawN>0)drawWorker(drawN);
  checkHandLimit();
  render();
}
function applyPL(card){
  if(nn(card['ターゲット所持金変動']))G.coins=Math.max(0,G.coins+card['ターゲット所持金変動']);
  if(nn(card['ターゲットメンタル変動']))G.mental=Math.max(0,G.mental+card['ターゲットメンタル変動']);
}
function applyCase(card,idx){
  if(idx<0||idx>=G.cases.length)return;
  const cs=G.cases[idx];
  if(!checkCond(card,cs))return;
  if(nn(card['ターゲット所持金変動']))cs.curCoins=Math.max(0,cs.curCoins+card['ターゲット所持金変動']);
  if(nn(card['ターゲットメンタル変動']))cs.curMental=Math.max(0,cs.curMental+card['ターゲットメンタル変動']);
  if(card['面談加算'])cs.meetMk=Math.max(0,cs.meetMk+card['面談加算']);
  if(card['通院加算'])cs.visitMk=Math.max(0,cs.visitMk+card['通院加算']);
  if(card['管理加算'])cs.mgmtMk=Math.max(0,cs.mgmtMk+card['管理加算']);
  if(nn(card['怒りフラグ']))cs.angerFlags=Math.max(0,cs.angerFlags+card['怒りフラグ']);
  if(nn(card['不正フラグ']))cs.illegalFlags=Math.max(0,cs.illegalFlags+card['不正フラグ']);
  if(card['自立フラグ']){cs.indFlag=true;addLog(`「${cs.data['カード名']}」自立フラグON`,'good');}
  if(card['移管フラグ']){resolveCase(idx,'移管（ソロ：除外）');updateSick();render();return;}
  if(nn(card['病気フラグ']))cs.sickFlag=Math.max(0,cs.sickFlag+card['病気フラグ']);
  if(card['ターゲット種別変動']){const nid=TYPE_T[card['ターゲット種別変動']];if(nid)transformCase(idx,nid);return;}
  checkMarkers(idx);updateSick();
}

// ─────────────────────────────────────────
// HAND MANAGEMENT
// ─────────────────────────────────────────
function checkHandLimit(){
  const over=G.hand.length-7;
  if(over>0)triggerDiscard(over);
}
function triggerDiscard(n,cb){
  G.discReq=n;G.discCb=cb||null;G.discSel=[];
  document.getElementById('disc-title').textContent=`手札から${n}枚を捨ててください`;
  document.getElementById('disc-grid').innerHTML=G.hand.map((c,i)=>{
    const pw=c['プレイヤー所持金変動'],pm=c['プレイヤーメンタル変動'];
    const tw=c['ターゲット所持金変動'],tm=c['ターゲットメンタル変動'];
    const costStr=[
      pw!=null?`💰${pw>0?'+':''}${pw}`:'',
      pm!=null?`🧠${pm>0?'+':''}${pm}`:'',
      tw!=null?`→💰${tw>0?'+':''}${tw}`:'',
      tm!=null?`→🧠${tm>0?'+':''}${tm}`:'',
    ].filter(Boolean).join(' ');
    return `<div class="discard-item" id="di-${i}">
      <div onclick="toggleDiscard(${i})" style="flex:1;display:flex;justify-content:space-between;align-items:center;">
        <span style="font-weight:700;">${c['カード名']}</span>
        <span style="font-size:.6rem;color:#555;">${c['種別']} ${c['レアリティ']}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:3px;">
        <span style="font-size:.58rem;color:#666;">${costStr}</span>
        <button onclick="showDiscardDetail(${i})" style="font-size:.58rem;padding:1px 6px;border-radius:4px;border:1px solid #333;background:#1a1a1a;color:#888;cursor:pointer;">詳細</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('disc-ok').disabled=true;
  openModal('modal-discard');
}
function showDiscardDetail(idx){
  const c=G.hand[idx];
  if(!c)return;
  document.getElementById('mc-title').textContent=c['カード名'];
  document.getElementById('mc-detail').textContent=c['効果詳細テキスト']||'（効果詳細なし）';
  document.getElementById('mc-targets').innerHTML='';
  document.getElementById('mc-btns').innerHTML=`<button class="mbtn mbtn-cancel" onclick="closeModal('modal-card')">閉じる</button>`;
  openModal('modal-card');
}
function toggleDiscard(idx){
  const si=G.discSel.indexOf(idx);
  if(si>=0){G.discSel.splice(si,1);document.getElementById(`di-${idx}`).classList.remove('sel');}
  else if(G.discSel.length<G.discReq){G.discSel.push(idx);document.getElementById(`di-${idx}`).classList.add('sel');}
  document.getElementById('disc-ok').disabled=G.discSel.length<G.discReq;
}
function confirmDiscard(){
  G.discSel.sort((a,b)=>b-a).forEach(i=>G.wDiscard.push(...G.hand.splice(i,1)));
  G.discSel=[];closeModal('modal-discard');
  if(G.discCb){G.discCb();G.discCb=null;}
  render();
}
function extraDraw(){
  if(G.phase!=='action'||G.actLeft<=0||G.coins<=0)return;
  G.coins=Math.max(0,G.coins-1);G.actLeft--;
  drawWorker(1);checkHandLimit();
  addLog('追加ドロー 💰-1');render();
}
function cancelSelect(){G.selCard=null;render();}

// ─────────────────────────────────────────
// GAME OVER / WIN
// ─────────────────────────────────────────
function checkWin(){
  if(G.mode==='training'&&G.points>=5){G.phase='win';saveRecord();showWin();return true;}
  return false;
}
function gameOver(reason){
  if(G.phase==='gameOver')return;
  G.phase='gameOver';saveRecord();
  // 開いているモーダルを全て閉じる
  ['modal-card','modal-trouble','modal-roulette','modal-discard','modal-case-detail','ind-popup'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){el.classList.add('hidden');}
  });
  document.getElementById('over-reason').textContent=reason;
  document.getElementById('over-icon').textContent=reason.includes('監査')?'⚖️':'💀';
  document.getElementById('over-stats').innerHTML=buildStats();
  showScreen('scn-over');
}
function showWin(){document.getElementById('win-stats').innerHTML=buildStats();showScreen('scn-win');}
function buildStats(){
  return `<div class="rs-row"><span class="rs-label">獲得PT</span><span class="rs-val">${G.points} pt</span></div>
  <div class="rs-row"><span class="rs-label">ターン数</span><span class="rs-val">${G.turn} T</span></div>
  <div class="rs-row"><span class="rs-label">担当ケース</span><span class="rs-val">${G.cases.length} 件</span></div>
  <div class="rs-row"><span class="rs-label">モード</span><span class="rs-val">${G.mode==='training'?'トレーニング':'エンドレス'} / ${G.diff==='hard'?'ハード':'ノーマル'}</span></div>`;
}
function saveRecord(){
  if(G.mode!=='endless')return;
  const save=getSave();
  const key=`rank_${G.diff}`;
  const recs=save[key]||[];
  recs.push({points:G.points,turns:G.turn,date:Date.now()});
  recs.sort((a,b)=>b.points-a.points||b.turns-a.turns);
  save[key]=recs.slice(0,10);setSave(save);
}
function returnToMode(){G={};showScreen('scn-mode');}
function confirmQuit(){if(confirm('ゲームを終了しますか？'))location.href='index.html';}

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────
function render(){
  if(!G.phase||G.phase==='setup'||G.phase==='gameOver'||G.phase==='win')return;
  renderStatus();
  renderCases();
  renderHand();
}

function renderStatus(){
  document.getElementById('sb-turn').textContent=`T${G.turn}`;
  document.getElementById('sb-mode').textContent=`${G.mode==='training'?'トレーニング':'エンドレス'} / ${G.diff==='hard'?'ハード':'ノーマル'}`;
  document.getElementById('st-pt').textContent=G.points;
  document.getElementById('st-coin').textContent=G.coins;
  document.getElementById('st-mental').textContent=G.mental;
  const mb=document.getElementById('st-mental-block');
  mb.className='stat-block s-mental'+(G.mental<=2?' low':'');
  // フラグ
  const flags=[];
  if(G.isSick)flags.push('<span class="sflag sf-sick">🦠 病気</span>');
  if(G.auditFlag)flags.push('<span class="sflag sf-audit">⚖️ 監査中</span>');
  if(G.guardFlag)flags.push('<span class="sflag sf-guard">🛡 ガード</span>');
  document.getElementById('st-flags').innerHTML=flags.join('');
  // フェーズ
  const pn={'action':'アクションフェーズ','recovery':'回復中','trouble':'トラブル処理中','addCase':'ケース追加中','turnEnd':'ターンエンド中'};
  document.getElementById('phase-info').textContent=pn[G.phase]||G.phase;
  document.getElementById('action-count').textContent=G.phase==='action'?`残行動 ${G.actLeft} / ${G.actTotal}`:'';
  document.getElementById('action-count').className='action-count'+(G.actLeft<=0?' zero':'');
  document.getElementById('btn-end-turn').disabled=G.phase!=='action';
}

function rarCls(r){return r==='UR'?'r-ur':r==='SR'?'r-sr':'r-r';}

function renderCases(){
  const grid=document.getElementById('cases-grid');
  grid.innerHTML='';
  if(!G.cases.length){
    grid.innerHTML='<div style="font-size:.72rem;color:#444;padding:14px;">担当ケースなし</div>';return;
  }
  G.cases.forEach((cs,i)=>{
    const d=cs.data;
    const isHard=d['種別']==='困難';
    const illGlow=cs.illegalFlags>0?' illegal-glow':'';
    const auditGlow=G.auditFlag&&cs.illegalFlags>0?' audit-glow':'';
    const tgted=G.selCard!==null?' targeted':'';
    const tSt=TYPE_STYLES[d['種別']]||'rgba(255,255,255,.07);color:#aaa';

    // ピップ
    const pips=n=>`<div class="pips">${Array(3).fill(0).map((_,j)=>`<div class="pip${j<n?' on':''}"></div>`).join('')}</div>`;
    // マーカー
    const mks=[];
    mks.push(`<div class="mk mk-anger">😠${pips(Math.min(cs.angerFlags,3))} ${cs.angerFlags}/3</div>`);
    if(cs.illegalFlags>0)mks.push(`<div class="mk mk-illegal">🚫 不正×${cs.illegalFlags}</div>`);
    if(cs.sickFlag>0)mks.push(`<div class="mk mk-sick">🦠 ${cs.sickFlag}</div>`);
    if(cs.meetMk>0)mks.push(`<div class="mk mk-meet">面 ${cs.meetMk}/2</div>`);
    if(cs.visitMk>0)mks.push(`<div class="mk mk-visit">通 ${cs.visitMk}/2</div>`);
    if(cs.mgmtMk>0)mks.push(`<div class="mk mk-mgmt">管 ${cs.mgmtMk}/2</div>`);
    if(cs.indFlag)mks.push(`<div class="mk mk-ind">✓自立</div>`);
    // 毎T・PL・不正条件タグ
    const ttags=[];
    const tw=d['ターンエンド_所持金変動'],tm=d['ターンエンド_メンタル変動'];
    if(nn(tw))ttags.push(`<span class="tag ${tw<0?'t-minus':'t-plus'}">💰${signed(tw)}</span>`);
    if(nn(tm))ttags.push(`<span class="tag ${tm<0?'t-minus':'t-plus'}">🧠${signed(tm)}</span>`);
    const pltags=[];
    const pw=d['プレイヤー所持金変動'],pm=d['プレイヤーメンタル変動'];
    if(nn(pw))pltags.push(`<span class="tag ${pw<0?'t-minus':'t-plus'}">💰${signed(pw)}</span>`);
    if(nn(pm))pltags.push(`<span class="tag ${pm<0?'t-minus':'t-plus'}">🧠${signed(pm)}</span>`);
    const ic=d['ターンエンド_不正フラグ加算条件_所持金'],im=d['ターンエンド_不正フラグ加算条件_メンタル'];
    const illParts=[];
    if(nn(ic))illParts.push(`💰≦${ic}`);if(nn(im))illParts.push(`🧠≦${im}`);
    const income=d['収入フラグ']==='収入あり'?'<span class="bdg bdg-income-yes">🟡 収入</span>':'<span class="bdg bdg-income-no">収入なし</span>';

    const el=document.createElement('div');
    el.className=`case-card${illGlow}${auditGlow}${tgted}`;
    el.innerHTML=`
      <div class="cc-img"><div class="cc-img-grad"></div><span class="cc-noimg">NOIMAGE</span></div>
      <div class="cc-right">
        <div class="cc-hdr">
          <div class="cc-left">
            <span class="cc-id">ID: ${d['ID']}</span>
            <span class="cc-name">${d['カード名']}</span>
            <div class="cc-sub">
              <span class="bdg" style="background:${tSt};">${d['種別']}</span>
              ${income}
            </div>
          </div>
          <div class="cc-meta">
            <div class="cc-meta-top">
              <div class="pt-badge${isHard?' hard':''}">${d['獲得ポイント']||1}</div>
              <span class="rar ${rarCls(d['レアリティ'])}">${d['レアリティ']}</span>
            </div>
          </div>
        </div>
        <div class="cc-markers">${mks.join('')}</div>
        <div class="cc-body">
          <div class="cc-stats-row">
            <span class="cc-stat cs-coin">💰 ${cs.curCoins}</span>
            <span class="cc-stat cs-mental">🧠 ${cs.curMental}</span>
            ${cs.sickFlag>0?`<span class="cc-stat cs-sick">🦠 ${cs.sickFlag}</span>`:''}
          </div>
          <div class="cc-divider"></div>
          <div class="cc-effects">
            ${ttags.length?`<span style="font-size:.48rem;color:#555;margin-right:2px;">毎T</span>${ttags.join('')}`:''}
            ${pltags.length?`<span style="font-size:.48rem;color:#555;margin-right:2px;margin-left:4px;">PL</span>${pltags.join('')}`:''}
          </div>
          ${illParts.length?`<div style="margin-top:1px;"><span class="ill-cond">${illParts.join('　')}</span></div>`:''}
        </div>
      </div>`;
    // クリックイベント
    if(G.selCard!==null){
      el.onclick=()=>onClickCaseTarget(i);
    } else {
      el.onclick=()=>showCaseDetail(i);
    }
    grid.appendChild(el);
  });
}

function onClickCaseTarget(idx){
  if(G.selCard===null)return;
  const card=G.hand[G.selCard];
  const range=card['対象範囲'];
  if(['自分','ワーカー単体','ワーカー全員'].includes(range))return;
  if(!checkCond(card,G.cases[idx])){addLog('使用条件を満たしていません','danger');return;}
  // _targetsからidxを探す
  const ti=G._targets.findIndex(t=>t.type==='case'&&t.idx===idx);
  if(ti<0)return;
  const hi=G.selCard;G.selCard=null;
  closeModal('modal-card');
  doUse(hi,ti);
}

function showCaseDetail(idx){
  const cs=G.cases[idx];const d=cs.data;
  document.getElementById('cd-title').textContent=d['カード名'];
  document.getElementById('cd-text').textContent=
    `${d['効果詳細テキスト']||''}\n\n💰${cs.curCoins} / 🧠${cs.curMental}\n怒り${cs.angerFlags} 不正${cs.illegalFlags} 病気${cs.sickFlag}\n面談${cs.meetMk} 通院${cs.visitMk} 管理${cs.mgmtMk}`;
  openModal('modal-case-detail');
}

function renderHand(){
  const scroll=document.getElementById('hand-scroll');
  scroll.innerHTML='';
  const isAct=G.phase==='action';
  G.hand.forEach((card,i)=>{
    const isSel=G.selCard===i;
    const hasAct=isAct&&G.actLeft>0;
    const usable=hasAct&&canAfford(card)&&hasAnyTarget(card);
    const rar=card['レアリティ'];
    const el=document.createElement('div');
    el.className=`wk-card${isSel?' selected':''}${!usable?' unusable':''}`;
    // タグ生成
    const tags=[];
    const pw=card['プレイヤー所持金変動'],pm=card['プレイヤーメンタル変動'];
    if(nn(pw))tags.push(`<span class="tag ${pw<0?'t-minus':'t-plus'}">💰${signed(pw)}</span>`);
    if(nn(pm))tags.push(`<span class="tag ${pm<0?'t-minus':'t-plus'}">🧠${signed(pm)}</span>`);
    const tw=card['ターゲット所持金変動'],tm=card['ターゲットメンタル変動'];
    if(nn(tw))tags.push(`<span class="tag ${tw<0?'t-minus':'t-plus'}">💰${signed(tw)}</span>`);
    if(nn(tm))tags.push(`<span class="tag ${tm<0?'t-minus':'t-plus'}">🧠${signed(tm)}</span>`);
    if(card['面談加算'])tags.push(`<span class="tag t-special">面+${card['面談加算']}</span>`);
    if(card['通院加算'])tags.push(`<span class="tag t-special">通+${card['通院加算']}</span>`);
    if(card['管理加算'])tags.push(`<span class="tag t-special">管+${card['管理加算']}</span>`);
    if(nn(card['怒りフラグ']))tags.push(`<span class="tag t-special">😠${signed(card['怒りフラグ'])}</span>`);
    if(nn(card['不正フラグ']))tags.push(`<span class="tag t-special">不正${signed(card['不正フラグ'])}</span>`);
    if(card['自立フラグ'])tags.push(`<span class="tag t-special">自立</span>`);
    if(card['ドロー数'])tags.push(`<span class="tag t-special">ドロー+${card['ドロー数']}</span>`);
    if(card['ターゲット種別変動'])tags.push(`<span class="tag t-special">→${card['ターゲット種別変動']}</span>`);

    // 使用条件タグ
    const condTags=[];
    if(card['使用条件_ケース種別'])condTags.push(`<span class="tag t-cond" style="font-size:.48rem;">${card['使用条件_ケース種別']}</span>`);
    if(card['使用条件_フラグ'])condTags.push(`<span class="tag t-cond" style="font-size:.48rem;">${card['使用条件_フラグ']}</span>`);
    if(nn(card['使用条件_ケース所持下限']))condTags.push(`<span class="tag t-cond" style="font-size:.48rem;">💰≥${card['使用条件_ケース所持下限']}</span>`);
    if(nn(card['使用条件_ケースメンタル下限']))condTags.push(`<span class="tag t-cond" style="font-size:.48rem;">🧠≥${card['使用条件_ケースメンタル下限']}</span>`);

    el.innerHTML=`
      <div class="wk-hdr">
        <div class="wk-left">
          <span class="wk-id">ID: ${card['ID']}</span>
          <span class="wk-name">${card['カード名']}</span>
          <div class="wk-sub">
            <span class="bdg-type-w">${card['種別']}</span>
          </div>
        </div>
        <div class="wk-meta">
          <span class="rar ${rarCls(rar)}">${rar}</span>
        </div>
      </div>
      <div class="wk-img"><div class="wk-img-grad"></div><span class="wk-noimg">NOIMAGE</span></div>
      <div class="wk-div"></div>
      <div class="wk-body">
        <div class="wk-row">
          <span class="tag t-target" style="font-size:.48rem;">${card['対象範囲']||'—'}</span>
          ${condTags.join('')}
        </div>
        <div class="wk-row">${tags.join('')||'<span class="tag t-neutral" style="font-size:.48rem;">詳細参照</span>'}</div>
      </div>`;
    // アクションフェーズ中は行動残数問わずタップでモーダルを開く（残0の場合は詳細確認のみ可）
    el.onclick=()=>{ if(isAct) onClickWorker(i); };
    scroll.appendChild(el);
  });
  document.getElementById('hand-count').textContent=`${G.hand.length}/7`;
  document.getElementById('btn-xdraw').disabled=G.phase!=='action'||G.actLeft<=0||G.coins<=0;
  document.getElementById('btn-cancel').style.display=G.selCard!==null?'inline-block':'none';
}

function addLog(msg,type=''){
  G.log=(G.log||[]);
  G.log.unshift({msg,type});
  if(G.log.length>50)G.log.pop();
  const area=document.getElementById('log-area');
  if(!area)return;
  area.innerHTML=G.log.slice(0,15).map(e=>`<div class="log-line${e.type?` lc-${e.type}`:''}">${e.msg}</div>`).join('');
}

// ── boot ──
showScreen('scn-mode');
</script>
</body>
</html>
